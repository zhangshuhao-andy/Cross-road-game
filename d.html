<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极限过马路 d1.7 - 张书豪赛博版</title>
    <style>
        :root {
            --p1-color: #00f2ff; --p2-color: #ff007b;
            --bg-dark: #0a0e14; --glass: rgba(15, 23, 42, 0.85);
        }

        body {
            margin: 0; background: var(--bg-dark); height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; color: #fff;
        }

        #stage {
            position: relative; border: 4px solid #1e293b; border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); overflow: hidden;
        }

        canvas { display: block; }

        /* HUD 霓虹面板 */
        #hud {
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between;
            padding: 20px; box-sizing: border-box; pointer-events: none; z-index: 100;
        }
        .stat-card {
            background: var(--glass); padding: 10px 20px; border-radius: 12px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            min-width: 120px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .p1-box { border-left: 4px solid var(--p1-color); }
        .p2-box { border-right: 4px solid var(--p2-color); text-align: right; }
        .stat-card b { display: block; font-size: 12px; opacity: 0.6; text-transform: uppercase; }
        .stat-card span { font-size: 20px; font-weight: 800; font-family: monospace; }

        /* 浮动菜单 */
        #main-menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; backdrop-filter: blur(20px);
        }
        .neon-text {
            font-size: 56px; font-weight: 900; margin: 0;
            background: linear-gradient(to right, var(--p1-color), var(--p2-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
        }

        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .glow-btn {
            padding: 15px 35px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 16px; transition: 0.3s;
            background: #fff; color: #000;
        }
        .glow-btn:hover { transform: translateY(-3px); box-shadow: 0 0 20px var(--p1-color); }
        .btn-sec { background: transparent; border: 1px solid #fff; color: #fff; }

        /* 侧边滑出窗 (商店和关于) */
        .side-panel {
            position: absolute; top: 0; right: -350px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px); z-index: 1000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .side-panel.active { right: 0; }
        .side-panel h2 { color: var(--p1-color); border-bottom: 1px solid #333; padding-bottom: 10px; }

        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .shop-item button {
            background: var(--p2-color); border: none; color: #fff; padding: 5px 12px;
            border-radius: 4px; cursor: pointer;
        }

        #winner-ui {
            display: none; position: absolute; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="hud">
        <div class="stat-card p1-box">
            <b>P1 NEON</b>
            <span id="p1-score">0</span> / 100 <br>
            <small>💰 <span id="p1-coins">0</span></small>
        </div>
        <div class="stat-card p2-box">
            <b>P2 CYBER</b>
            <span id="p2-score">0</span> / 100 <br>
            <small>💰 <span id="p2-coins">0</span></small>
        </div>
    </div>

    <div id="main-menu">
        <h1 class="neon-text">DUEL d1.7</h1>
        <p style="letter-spacing: 5px; opacity: 0.7;">DEVELOPER: 张书豪</p>
        <div class="btn-group">
            <button class="glow-btn" onclick="start()">开始对战</button>
            <button class="glow-btn btn-sec" onclick="togglePanel('shop')">商店</button>
            <button class="glow-btn btn-sec" onclick="togglePanel('about')">关于</button>
        </div>
        <p style="margin-top: 40px; font-size: 12px; color: #666;">P1: WASD | P2: 方向键</p>
    </div>

    <div id="shop-panel" class="side-panel">
        <h2>技能商店</h2>
        <p>消耗 15 💰 购买：</p>
        <div class="shop-item"><span>🕒 慢速时空</span> <button onclick="buy('slow')">购买</button></div>
        <div class="shop-item"><span>🛡️ 纳米护盾</span> <button onclick="buy('shield')">购买</button></div>
        <div class="shop-item"><span>🧲 磁力核心</span> <button onclick="buy('mag')">购买</button></div>
        <div class="shop-item"><span>💎 额外核心</span> <button onclick="buy('life')">购买</button></div>
        <button class="glow-btn" style="width:100%; margin-top:30px;" onclick="togglePanel()">返回</button>
    </div>

    <div id="about-panel" class="side-panel">
        <h2>版本信息</h2>
        <p><b>系列：</b> d (Dual)</p>
        <p><b>版本：</b> 1.7 极致视觉版</p>
        <p><b>开发者：</b> 张书豪</p>
        <p>更新点：<br>1. 赛博霓虹视觉引擎<br>2. 侧边交互式商店<br>3. 动态光影车辆<br>4. 修复了商店消失的Bug</p>
        <button class="glow-btn" style="width:100%; margin-top:30px;" onclick="togglePanel()">返回</button>
    </div>

    <div id="winner-ui">
        <h1 id="winner-msg" style="font-size: 48px;"></h1>
        <button class="glow-btn" onclick="location.reload()">重新加载</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 52, COLS = 14, ROWS = 13;
canvas.width = COLS * GRID; canvas.height = ROWS * GRID;

let game = { running: false, camY: 0, frame: 0 };
let world = [], entities = [];
let players = [
    { id: 1, x: 4, y: 0, color: '#00f2ff', coins: 0, score: 0, shield: false, alive: true, skills: new Set() },
    { id: 2, x: 9, y: 0, color: '#ff007b', coins: 0, score: 0, shield: false, alive: true, skills: new Set() }
];

function togglePanel(id) {
    document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
    if(id) document.getElementById(id+'-panel').classList.add('active');
}

function buy(skill) {
    // 简单逻辑：P1和P2谁有钱谁买（双人共享逻辑优化）
    let buyer = players[0].coins >= 15 ? players[0] : (players[1].coins >= 15 ? players[1] : null);
    if(buyer) {
        buyer.coins -= 15;
        buyer.skills.add(skill);
        if(skill === 'shield') buyer.shield = true;
        refreshUI();
        alert(`P${buyer.id} 已装备 ${skill}！`);
    } else alert("金币不足 (需 15 💰)");
}

function refreshUI() {
    document.getElementById('p1-score').innerText = players[0].score;
    document.getElementById('p1-coins').innerText = players[0].coins;
    document.getElementById('p2-score').innerText = players[1].score;
    document.getElementById('p2-coins').innerText = players[1].coins;
}

function buildWorld() {
    world = [];
    for(let i=0; i<=110; i++) {
        let type = (i<3 || i>=100) ? 'safe' : (Math.random()<0.2 ? 'grass' : (Math.random()<0.8 ? 'road' : 'rail'));
        world.push({
            y: i, type, speed: 1.5 + Math.random()*2,
            dir: Math.random() > 0.5 ? 1 : -1,
            timer: 0, coinX: Math.random() < 0.2 ? Math.floor(Math.random()*COLS) : -1
        });
    }
}

function start() {
    buildWorld();
    game.running = true;
    document.getElementById('main-menu').style.display = 'none';
    loop();
}

function loop() {
    if(!game.running) return;
    update();
    draw();
    game.frame++;
    requestAnimationFrame(loop);
}

function update() {
    let leadY = Math.max(players[0].y, players[1].y);
    let targetY = leadY * GRID - GRID * 7;
    game.camY += (Math.max(0, targetY) - game.camY) * 0.1;

    world.forEach(row => {
        if(row.type === 'road' || row.type === 'rail') {
            row.timer--;
            if(row.timer <= 0) {
                entities.push({
                    x: row.dir > 0 ? -300 : canvas.width + 100,
                    y: row.y * GRID,
                    w: row.type === 'rail' ? 450 : 100,
                    h: GRID - 14,
                    speed: row.speed * (row.type === 'rail' ? 4 : 1),
                    dir: row.dir, type: row.type,
                    color: `hsl(${game.frame % 360}, 70%, 50%)`
                });
                row.timer = 120 + Math.random()*100;
            }
        }
        
        // 捡钱
        if(row.coinX !== -1) {
            players.forEach(p => {
                if(p.alive && p.y === row.y && Math.abs(p.x - row.coinX) < 0.7) {
                    p.coins++; row.coinX = -1; refreshUI();
                }
            });
        }
    });

    for(let i=entities.length-1; i>=0; i--) {
        let e = entities[i];
        e.x += e.speed * e.dir;
        players.forEach(p => {
            if(!p.alive) return;
            let px = p.x * GRID + 12, py = p.y * GRID + 12;
            if(px < e.x + e.w && px + 28 > e.x && py < e.y + e.h && py + 28 > e.y) {
                if(p.shield) { p.shield = false; entities.splice(i, 1); }
                else p.alive = false;
            }
        });
        if(e.x < -600 || e.x > canvas.width + 600) entities.splice(i, 1);
    }

    players.forEach(p => {
        if(p.alive && p.y * GRID < game.camY - GRID) p.alive = false; 
        if(p.alive && p.y >= 100) endGame(`P${p.id} 抵达终点！`);
    });

    if(!players[0].alive && !players[1].alive) endGame("全部阵亡");
}

function endGame(msg) {
    game.running = false;
    document.getElementById('winner-ui').style.display = 'flex';
    document.getElementById('winner-msg').innerText = msg;
}

function draw() {
    ctx.fillStyle = '#0a0e14'; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, canvas.height - GRID + game.camY);

    // 地形
    world.forEach(row => {
        let ry = -row.y * GRID;
        if(ry < -game.camY - canvas.height - GRID || ry > -game.camY + GRID) return;

        if(row.type === 'safe') ctx.fillStyle = '#1e293b';
        else if(row.type === 'grass') ctx.fillStyle = '#0f172a';
        else if(row.type === 'road') ctx.fillStyle = '#161b22';
        else ctx.fillStyle = '#000';
        
        ctx.fillRect(0, ry, canvas.width, GRID);
        if(row.type === 'road') {
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, ry + GRID/2 - 1, canvas.width, 2);
        }

        if(row.coinX !== -1) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff0";
            ctx.fillStyle = "#ff0"; ctx.beginPath();
            ctx.arc(row.coinX*GRID+26, ry+26, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    });

    // 车辆
    entities.forEach(e => {
        let ey = -e.y + 7;
        ctx.shadowBlur = 10; ctx.shadowColor = e.color;
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.roundRect(e.x, ey, e.w, e.h, 8); ctx.fill();
        // 霓虹尾焰
        ctx.fillStyle = "white";
        if(e.dir > 0) ctx.fillRect(e.x, ey+4, 10, e.h-8);
        else ctx.fillRect(e.x+e.w-10, ey+4, 10, e.h-8);
        ctx.shadowBlur = 0;
    });

    // 玩家
    players.forEach(p => {
        if(!p.alive) return;
        let px = p.x * GRID + 26, py = -p.y * GRID + 26;
        
        // 呼吸光环
        ctx.shadowBlur = 15 + Math.sin(game.frame*0.1)*5;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.fill();
        
        if(p.shield) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.stroke();
        }

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#000"; ctx.font = "bold 14px Arial";
        ctx.fillText("P"+p.id, px-8, py+5);
    });

    ctx.restore();
}

window.addEventListener('keydown', e => {
    if(!game.running) return;
    const k = e.key.toLowerCase();
    // P1
    if(players[0].alive) {
        if(k === 'w') { players[0].y++; if(players[0].y > players[0].score) players[0].score = players[0].y; }
        if(k === 'a' && players[0].x > 0) players[0].x--;
        if(k === 'd' && players[0].x < COLS-1) players[0].x++;
    }
    // P2
    if(players[1].alive) {
        if(e.key === 'ArrowUp') { players[1].y++; if(players[1].y > players[1].score) players[1].score = players[1].y; }
        if(e.key === 'ArrowLeft' && players[1].x > 0) players[1].x--;
        if(e.key === 'ArrowRight' && players[1].x < COLS-1) players[1].x++;
    }
    refreshUI();
});
</script>
</body>
</html>
